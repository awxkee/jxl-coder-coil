name: Build to Maven Local

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '*'
      - '!ci_test_*'
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - '*'
      - '!ci_test_*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle
      - name: Set version variable
        run: echo "GITHUB_REF_NAME=$GITHUB_REF_NAME" >> $GITHUB_ENV
      - name: Compile to maven local
        env:
          VERSION_NAME: "1.0.0"
          ORG_GRADLE_PROJECT_mavenCentralUsername: "stub"
          ORG_GRADLE_PROJECT_mavenCentralPassword: "stub"
          ORG_GRADLE_PROJECT_signingInMemoryKey: "stub"
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: "stub"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: "stub"
        run: bash ./gradlew jxlcodercoil:publishToMavenLocal